<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Imagem dinamica</title>
     <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Imagem dinamica</h1>
    <p>Tente abrir esse site em vários dispositivos diferentes ou simplesmente aumente e diminua o tamanho do seu navegador.</p>
    <picture>
        <source media="(max-width: 750px)" srcset="imagens/foto-p.png" type="image/png">
        <source media="(max-width: 1050px )" srcset="imagens/foto-m.png" type="image/png">
        <img src="Imagens/foto-g.png" alt="Imagem flexível">
        <h1>Vamos por um audio baixado do Youtube !</h1>
        <audio preload="metadata" autoplay controls loop>
            <source src="midia/alge.mp3" type="audio/mpeg">
            <source src="midia/alge.mp3" type="audio/ogg">
            <p>Audio não compativel para seu navegador</p>
        </audio>
    </picture>
</body>
</html>
